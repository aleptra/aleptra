<!doctype html>
<html lang="en">

<head>
  <base hrefhost="aleptra.github.io:[front-front2-nu]">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="version" content="1.0.0">
  <script src="https://cdn.front.nu/nightly/front.js"
    module="globalize;chronotize;data;navigate;keyboard;screen;canvas;overlay;form;storage"
    plugin="wave;filtersearch;scrollbar" var="api"
    conf="debug:false;debugLocalhost:false;varsDir:/assets/json/vars;storageKey:front"
    globalize-conf="folder:assets/json/locales;ttl:3600000"
    navigate-conf="startpage:front-front2-nu;startpageLocal:github-test-folder"
    scrollbar--conf="width:auto;radius:3;thumb:black;hover:#ffffff;track:#0b0d10">
    </script>
  <link type="text/css" href="https://cdn.front.nu/dist/front.css" rel="stylesheet">
  <link rel="icon" href="data:,">
  <style>
    .box *,
    .cards {
      box-sizing: border-box;
      width: 100%
    }

    a {
      color: inherit
    }

    .bottombar *,
    .topbar * {
      max-height: unset;
    }

    ul {
      padding: 0 0 0 2rem;
      flex-direction: column;
    }

    ul li {
      display: list-item;
    }

    canvas {
      filter: brightness(40%);
    }
  </style>
  <title>Aleptra</title>
</head>

<body bgcolor="black" color="white">
  <div id="navloader" class="navloader pa t0 bcwhite05" width="100%" height="2" hide>
    <div bgcolor="black" height="2"></div>
  </div>
  <header class="topbar" flex maxheight="unset" width="100%" alignitems="center"
    screen-xxs="padding:[0px 1rem 0px 1rem];height:[3.5rem]" screen-sm="padding:[0px 1.5rem 0px 1.5rem];height:[3.5rem]"
    screen-md="padding:[0 3rem 0 2.5rem];height:[4rem]" screen-lg="padding:[0px 3.5rem 0rem 3.5rem];height:[4rem]"
    color="white" zindex="60">
    <figure margin="0">
      <a href="./" key="0" marginright="2rem"><img height="40%" maxwidth="unset" src="assets/img/logo.svg"></a>
    </figure>
    <details class="pr" screen-xxs="show" screen-md="hide">
      <summary class="button" padding="0.5rem"><i class="icon24">≡</i></summary>
      <div bgcolor="black" border="1px solid #333" class="pa" padding="1rem" minwidth="10rem" radius="0.5rem" zindex="100" margintop="0.5rem" flex flexdirection="column" gap="1rem">
        <a click="overlay-dialog:#dialog" globalize-get>Products</a>
        <a href="pricing.html" globalize-get>Pricing</a>
      </div>
    </details>
    <div flex gap="2rem" marginleft="1rem" alignitems="center" screen-xxs="hide" screen-md="flex">
      <a click="overlay-dialog:#dialog" globalize-get bindglobal="href:href" if="([{href}]~[/workshop])/underline">Products</a>
      <a href="pricing.html" globalize-get bindglobal="href:href" if="([{href}]~[/pricing])/underline">Pricing</a>
    </div>
    <a href="account/login" globalize-get bindglobal="href:href" if="([{href}]~[/login])/underline" padding="0.3rem 1.2rem" border="1px solid white" radius="1rem" height="2rem" marginleft="auto">Login</a>
  </header>
  <nav></nav>
  <aside height="100%" screen-xs="hide;fixed" screen-lg="flex;relative" scrollbar--set="width:thin;thumb:white" top="0"
    zindex="20"></aside>
  <main height="100%" include="_includes/home.html" scrollbar--set></main>
  <aside></aside>
  <footer include="_includes/dialog_product.html"></footer>
</body>

</html>
