<script src="https://cdn.front.nu/nightly/front.js"></script>
<template srcdoc="../../index" bindvar="tes:test" src="../../_templates/launch"></template>
<title bindquery="app:app" globalize-get>{app}</title>

<article data-src="assets/json/software.json" bindquery="app:app" data-filteritem="name:'{app}'" flex alignself="center"
  bgcolor="white" padding="2rem" screen-xxs="width:[90%]" screen-xl="width:[40rem]" height="100%" color="black"
  boxshadow="1px 1px 100px 20px black">
  <section flex flexdirection="column" alignitems="center" justifycontent="center" height="100%" width="100%" relative>
    <div screen-xxs="flexdirection:[column]" screen-sm="flexdirection:[column]" screen-md="flexdirection:[column]"
      screen-xl="flexdirection:[row]" flex>
      <section flex flexdirection="column" id="register" storage="api" align="center">
        <img width="128" height="128" margin="0 auto" marginbottom="1rem" data-get="icon:icon"
          data-ongetload="setsrc:[{icon}]">

        <h1 globalize-get data-set="color:color" color="{color}" bold data-get="name"></h1>
        <h6 margintop="1rem" marginbottom="2rem" data-get="description" globalize-get></h6>

        <form method="get" alignitems="center" color="black" bindasset="endpoint:api.persons_collection.endpoint"
          action="https://note.aleptra.com" data-onsuccess="hide:#register;show:#complete" data-onerror="show:#error">

          <a href="https://note.aleptra.com" margintop="1rem" minheight="2.7rem" radius="1rem"
            padding="0.5rem 1.4rem 0.5rem 1.4rem" minheight="2.7rem" border="1px solid silver" bgcolor="black"
            data-set="color:color" mouseover="bgcolor:[{color}]" mouseout="bgcolor:[black]" color="white" class="button"
            globalize-get>Launch application</a>

          <div id="error" bgcolor="red" color="yellow" margintop="1rem" marginbottom="2rem" padding="1rem" hide>
            Something went wrong. Please try again.</div>

          <hr margintop="2rem" width="100%" bgcolor="silver">

          <div color="black" margintop="1rem" alignself="center" gap="0.75rem">
            <a href="account/recover" globalize-get bindglobal="href:href" data-set="color:color"
              mouseover="color:[{color}]" mouseout="color:[inherit]">Forgot account?</a>
            <a href="account/create" globalize-get bindglobal="href:href" data-set="color:color"
              mouseover="color:[{color}]" mouseout="color:[inherit]">Create an account</a>
          </div>
        </form>

      </section>
    </div>
  </section>

  <section id="complete" class="pauto tac" hide>
    <h1 globalize-get="thank_you!">Thank you!</h1>
    <p globalize-get="page_register_complete">Your registration will be reviewed within 24 hours.</p>
    <i class="icon mt2">&#8962;</i><a href="/" globalize-get="go_to_startpage">Go to startpage</a>
  </section>
</article>

<div include="_includes/terms.html"></div>
<section include="_includes/footer.html"></section>
